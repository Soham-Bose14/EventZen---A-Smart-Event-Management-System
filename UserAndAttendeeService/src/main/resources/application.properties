spring.application.name=UserAndAttendeeService
spring.datasource.url=jdbc:mysql://localhost:3306/event_management
spring.datasource.username=root
spring.datasource.password=SohamRoot@123

# 1. TABLE MANAGEMENT 
# Creates new tables (users/registrations) but won't touch existing ones if mapped correctly
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 2. THE "NO GLITCH" NAMING STRATEGY
# MANDATORY: Ensures 'AvailableTickets' stays 'AvailableTickets' and doesn't become 'available_tickets'
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 3. DATABASE DIALECT
# Helps Java understand the 'datetime(6)' and 'longtext' types created by .NET
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect